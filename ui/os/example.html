<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        .drag-area {
            background-color: #333;
            color: white;
            padding: 1rem;
            cursor: move;
            border-radius: 8px;
            user-select: none;
        }
    </style>
</head>
<body>
    <h2>OS Window Styling Example</h2>
    <p>Try modifying CAN_CLOSE, CAN_MINIMIZE, TITLEBAR in properties.config and rebuild.</p>
    
    <div class="drag-area" onmousedown="if(window.dragWindow) window.dragWindow('')">
        Drag me to move the app! (Requires DRAG_BACKGROUND=true)
    </div>
</body>
</html>
