<!DOCTYPE html>
<html>
<head>
    <style>
        .custom-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .custom-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h2>UI Component Example</h2>
    <p>This shows a nicely styled button component.</p>
    <button class="custom-button" onclick="alert('Component Clicked!')">I'm a Fancy Button</button>
</body>
</html>
