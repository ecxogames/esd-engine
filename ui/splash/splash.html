<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            padding: 2rem;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            user-select: none;
            overflow: hidden;
            border-radius: 20px;
        }
        .drag-area {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            cursor: pointer;
        }
        .content {
            z-index: 2;
            text-align: center;
            pointer-events: none; /* Let drag events pass through */
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="drag-area" onmousedown="if(window.dragWindow) window.dragWindow('')"></div>
    <div class="content">
        <div class="spinner"></div>
        <h2>ESD Suite Loading...</h2>
        <p>Initializing framework and Python backend environment.</p>
    </div>

    <script>
        // Wait 3 seconds then seamlessly instruct C++ to transition to main app
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.transitionToMain) {
                    window.transitionToMain("");
                }
            }, 3000);
        });
    </script>
</body>
</html>
